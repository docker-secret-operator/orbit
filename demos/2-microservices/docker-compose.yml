version: '3.8'

services:
  # Database Layer
  postgres:
    image: postgres:15-alpine
    container_name: dpivot-micro-db
    environment:
      POSTGRES_DB: microservices
      POSTGRES_USER: dpivot
      POSTGRES_PASSWORD: demo_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./services/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dpivot"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - dpivot-mesh

  redis:
    image: redis:7-alpine
    container_name: dpivot-micro-cache
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - dpivot-mesh

  # API Gateway
  gateway:
    build:
      context: ./services/gateway
      dockerfile: Dockerfile
    container_name: dpivot-gateway
    environment:
      GATEWAY_PORT: 3000
      AUTH_SERVICE_URL: http://auth-service:8001
      USER_SERVICE_URL: http://user-service:8002
      PRODUCT_SERVICE_URL: http://product-service:8003
      ORDER_SERVICE_URL: http://order-service:8004
      PAYMENT_SERVICE_URL: http://payment-service:8005
    ports:
      - "3000:3000"
    depends_on:
      - auth-service
      - user-service
      - product-service
      - order-service
      - payment-service
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - dpivot-mesh
    labels:
      service: "gateway"
      tier: "api"

  # Core Services
  auth-service:
    build:
      context: ./services/auth
      dockerfile: Dockerfile
    container_name: dpivot-auth-service
    environment:
      AUTH_PORT: 8001
      DATABASE_URL: postgres://dpivot:demo_password@postgres:5432/microservices
      REDIS_URL: redis://redis:6379
      SERVICE_NAME: auth-service
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 15s
    networks:
      - dpivot-mesh
    labels:
      service: "auth-service"
      tier: "core"

  user-service:
    build:
      context: ./services/user
      dockerfile: Dockerfile
    container_name: dpivot-user-service
    environment:
      USER_PORT: 8002
      DATABASE_URL: postgres://dpivot:demo_password@postgres:5432/microservices
      REDIS_URL: redis://redis:6379
      SERVICE_NAME: user-service
      AUTH_SERVICE_URL: http://auth-service:8001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    ports:
      - "8002:8002"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 15s
    networks:
      - dpivot-mesh
    labels:
      service: "user-service"
      tier: "core"
      depends_on: "auth-service"

  product-service:
    build:
      context: ./services/product
      dockerfile: Dockerfile
    container_name: dpivot-product-service
    environment:
      PRODUCT_PORT: 8003
      DATABASE_URL: postgres://dpivot:demo_password@postgres:5432/microservices
      REDIS_URL: redis://redis:6379
      SERVICE_NAME: product-service
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8003:8003"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 15s
    networks:
      - dpivot-mesh
    labels:
      service: "product-service"
      tier: "core"

  order-service:
    build:
      context: ./services/order
      dockerfile: Dockerfile
    container_name: dpivot-order-service
    environment:
      ORDER_PORT: 8004
      DATABASE_URL: postgres://dpivot:demo_password@postgres:5432/microservices
      REDIS_URL: redis://redis:6379
      SERVICE_NAME: order-service
      USER_SERVICE_URL: http://user-service:8002
      PRODUCT_SERVICE_URL: http://product-service:8003
      PAYMENT_SERVICE_URL: http://payment-service:8005
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      user-service:
        condition: service_healthy
      product-service:
        condition: service_healthy
      payment-service:
        condition: service_healthy
    ports:
      - "8004:8004"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 15s
    networks:
      - dpivot-mesh
    labels:
      service: "order-service"
      tier: "core"
      depends_on: "user-service,product-service,payment-service"

  payment-service:
    build:
      context: ./services/payment
      dockerfile: Dockerfile
    container_name: dpivot-payment-service
    environment:
      PAYMENT_PORT: 8005
      DATABASE_URL: postgres://dpivot:demo_password@postgres:5432/microservices
      REDIS_URL: redis://redis:6379
      SERVICE_NAME: payment-service
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8005:8005"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8005/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 15s
    networks:
      - dpivot-mesh
    labels:
      service: "payment-service"
      tier: "core"

volumes:
  postgres_data:

networks:
  dpivot-mesh:
    driver: bridge
