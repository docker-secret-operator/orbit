version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: dpivot-demo-db
    environment:
      POSTGRES_DB: demo_app
      POSTGRES_USER: dpivot
      POSTGRES_PASSWORD: demo_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./services/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dpivot"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - dpivot-network

  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    container_name: dpivot-demo-api
    environment:
      DATABASE_URL: postgres://dpivot:demo_password@postgres:5432/demo_app?sslmode=disable
      API_PORT: 8080
      VERSION: v1
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - dpivot-network
    labels:
      service: "api"
      environment: "demo"

  web:
    build:
      context: ./services/web
      dockerfile: Dockerfile
    container_name: dpivot-demo-web
    environment:
      API_URL: http://api:8080
      NGINX_PORT: 80
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "8081:80"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - dpivot-network
    labels:
      service: "web"
      environment: "demo"

volumes:
  postgres_data:

networks:
  dpivot-network:
    driver: bridge
