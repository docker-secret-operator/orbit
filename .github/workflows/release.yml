name: release

# Release only from version tags (e.g. v1.2.3). The repository is not public
# yet; this workflow is inert until a tag is pushed to the real repo, and the
# job is guarded to that repo so forks don't attempt to publish.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # required for GoReleaser to create the GitHub Release

jobs:
  release:
    if: github.repository == 'docker-secret-operator/orbit'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history + tags so GoReleaser derives the version

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      # Gate the release on the same quality bar as CI before building artifacts.
      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test (stable, race)
        run: make test

      - name: Lint
        uses: golangci/golangci-lint-action@v6

      - name: GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
