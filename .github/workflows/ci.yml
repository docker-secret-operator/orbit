name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          # Without this, setup-go matches whatever 1.26.x is already cached
          # on the runner image rather than the newest patch — CI silently
          # ran go1.26.4 while go1.26.5 (fixing GO-2026-5856) was available.
          check-latest: true
          cache: true

      - name: Download modules
        run: go mod download

      - name: Build
        run: go build ./...

      # Deterministic packages only. Blocking gate — must stay green.
      # Excludes internal/testing/chaos, internal/testing/benchmark
      # (soak/long-running suites — see .github/workflows/soak.yml).
      # internal/stack and internal/state were excluded here as "known
      # flaky/failing"; both are now -race-clean and included.
      - name: Test (stable)
        run: |
          go test -race -count=1 \
            ./internal/api/... \
            ./internal/cli/... \
            ./internal/compose/... \
            ./internal/config/... \
            ./internal/history/... \
            ./internal/metrics/... \
            ./internal/plugin/... \
            ./internal/proxy/... \
            ./internal/rollout/... \
            ./internal/stack/... \
            ./internal/state/... \
            ./internal/volumes/... \
            ./internal/testing/concurrency/... \
            ./internal/testing/profile/... \
            ./cmd/...

      - name: Vet
        run: go vet ./...

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

      # Fails the build on any govulncheck finding that isn't on the reviewed
      # accepted-risk list below. See docs/governance/SECURITY.md "Dependency
      # Scanning" for the rationale on each accepted ID: all six are dockerd
      # (daemon)-side CVEs (archive extraction, `docker cp` races, AuthZ
      # bypass, plugin privilege validation, firewalld/bridge isolation) —
      # Orbit only imports github.com/docker/docker/client to call an
      # independently-running dockerd over its API and never executes daemon
      # code. Only GO-2025-3829 has a fixed version at all; the other five
      # are unfixed upstream even at latest, so upgrading would not clear
      # them regardless. Re-review this list if Orbit ever embeds or manages
      # the daemon directly, or if govulncheck reports a NEW id not below —
      # this step intentionally still fails on anything unreviewed.
      - name: Security (govulncheck)
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest

          accepted="GO-2026-5746 GO-2026-5668 GO-2026-5617 GO-2026-4887 GO-2026-4883 GO-2025-3829"

          set +e
          output="$(govulncheck ./... 2>&1)"
          exit_code=$?
          set -e
          echo "$output"

          if [ "$exit_code" -ne 0 ] && [ "$exit_code" -ne 3 ]; then
            echo "govulncheck failed to run (exit $exit_code)"
            exit "$exit_code"
          fi

          found="$(echo "$output" | grep -oE '^Vulnerability #[0-9]+: GO-[0-9]+-[0-9]+' | grep -oE 'GO-[0-9]+-[0-9]+$')"
          unaccepted=""
          for id in $found; do
            case " $accepted " in
              *" $id "*) ;;
              *) unaccepted="$unaccepted $id" ;;
            esac
          done

          if [ -n "$unaccepted" ]; then
            echo "New/unaccepted vulnerabilities found:$unaccepted"
            echo "Review against docs/governance/SECURITY.md and either fix or add to the accepted list with documented rationale."
            exit 1
          fi

          echo "All findings are on the reviewed accepted-risk list (docs/governance/SECURITY.md); passing."

  docker:
    # On a PR this is a smoke test only (build, don't push — PRs from forks
    # have no access to the Docker Hub secrets below regardless, and even
    # same-repo PRs shouldn't publish unmerged code). On push to main it
    # builds the same image and publishes it as technicaltalk/orbit:latest —
    # the exact reference internal/compose.Generate's generated proxy
    # services already hardcode, so every push to main keeps that tag
    # current.
    name: Docker Build & Publish (multi-arch)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build image (amd64 + arm64), push only from main
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: technicaltalk/orbit:latest
