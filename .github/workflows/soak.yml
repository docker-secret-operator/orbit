name: Soak & Chaos

# Long-running, non-deterministic-by-design test suites: internal/testing/chaos
# (multi-second scenario sleeps, three escalating tiers) and
# internal/testing/benchmark (five 60s sustained-load scenarios, ~5+ minutes
# total). These do not run on every push/PR — see .github/workflows/ci.yml
# for the fast, deterministic blocking gate.
#
# Runs nightly and on manual dispatch. Failures here are informational, not
# a merge gate — review results in the Actions tab.

on:
  schedule:
    - cron: '0 3 * * *' # 03:00 UTC daily
  workflow_dispatch: {}

jobs:
  chaos:
    name: Chaos Framework (all tiers)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Download modules
        run: go mod download

      - name: Run chaos suite
        run: go test -race -timeout 300s -count=1 -v ./internal/testing/chaos/...

  benchmark:
    name: Extended Load (soak)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Download modules
        run: go mod download

      - name: Run extended load tests
        run: go test -timeout 600s -count=1 -v ./internal/testing/benchmark/...

      - name: Run benchmarks
        run: go test -run '^$' -bench . -benchtime 1x ./internal/testing/benchmark/...
